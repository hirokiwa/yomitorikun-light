<!doctype html>
<html lang="{{common.htmlLang}}" prefix="og: https://ogp.me/ns#">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" />

    <title>{{meta.title}}</title>
    <meta name="description" content="{{meta.description}}" />
    <link rel="canonical" href="{{seo.canonicalUrl}}" />
    <link rel="alternate" hreflang="ja" href="{{seo.jaUrl}}" />
    <link rel="alternate" hreflang="en" href="{{seo.enUrl}}" />
    <link rel="alternate" hreflang="x-default" href="{{seo.defaultUrl}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@450&display=swap"
    />

    <meta property="og:url" content="{{meta.url}}" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="{{common.ogLocale}}" />
    <meta property="og:title" content="{{meta.title}}" />
    <meta property="og:description" content="{{meta.description}}" />
    <meta property="og:site_name" content="{{common.brandName}}" />
    <meta
      property="og:image"
      content="https://github-production-user-asset-6210df.s3.amazonaws.com/89170014/275133791-23c5e55f-afea-40d1-9d24-b43e4738dd22.png"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="{{common.brandAlt}}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@hirokiwasan" />
    <meta name="twitter:title" content="{{meta.title}}" />
    <meta name="twitter:description" content="{{meta.description}}" />
    <meta
      name="twitter:image"
      content="https://github-production-user-asset-6210df.s3.amazonaws.com/89170014/275133791-23c5e55f-afea-40d1-9d24-b43e4738dd22.png"
    />
    <meta name="twitter:image:type" content="image/jpeg" />
    <meta name="twitter:image:alt" content="{{common.brandAlt}}" />

    <!-- Google Adsense -->
    <meta name="google-adsense-account" content="ca-pub-5553296223899055" />
    <!-- --- -->
  </head>

  <body class="body">
    <header class="header">
      <a
        href="{{common.homeHref}}"
        class="titleLink"
        title="{{common.homeTitle}}"
        aria-current="page"
      >
        <div class="titleLinkInner">
          <img src="/logo.png" alt="{{common.iconAlt}}" class="iconImage" />
          <h1 class="title">{{common.brandName}}</h1>
        </div>
      </a>
      <nav class="locale-switcher" aria-label="{{home.localeSwitcher.ariaLabel}}">
        <a
          class="locale-switcher__link"
          href="{{home.localeSwitcher.href}}"
          hreflang="{{home.localeSwitcher.lang}}"
          lang="{{home.localeSwitcher.lang}}"
        >
          <svg
            class="locale-switcher__icon"
            viewBox="0 -960 960 960"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M325-111.5q-73-31.5-127.5-86t-86-127.5Q80-398 80-480.5t31.5-155q31.5-72.5 86-127t127.5-86Q398-880 480.5-880t155 31.5q72.5 31.5 127 86t86 127Q880-563 880-480.5T848.5-325q-31.5 73-86 127.5t-127 86Q563-80 480.5-80T325-111.5ZM480-162q26-36 45-75t31-83H404q12 44 31 83t45 75Zm-104-16q-18-33-31.5-68.5T322-320H204q29 50 72.5 87t99.5 55Zm208 0q56-18 99.5-55t72.5-87H638q-9 38-22.5 73.5T584-178ZM170-400h136q-5-40-5-80t5-80H170q-10 40-10 80t10 80Zm216 0h188q6-40 6-80t-6-80H386q-6 40-6 80t6 80Zm268 0h136q10-40 10-80t-10-80H654q5 40 5 80t-5 80ZM638-640h118q-29-50-72.5-87T584-782q36 66 54 142Zm-234 0h152q-24-88-76-158-52 70-76 158Zm-200 0h118q18-76 54-142-56 18-99.5 55T204-640Z"
            />
          </svg>
          <span class="locale-switcher__label">{{home.localeSwitcher.label}}</span>
        </a>
      </nav>
    </header>

    <div class="mainContents">
      <div class="contentsWrapper">
        <div class="bodyContent">
          <div id="messageBox"></div>
          <button
            class="readButton"
            id="readButton"
            type="button"
            aria-label="{{home.readLabel}}"
            title="{{home.readLabel}}"
          >
            <svg
              xmlns="https://www.w3.org/2000/svg"
              height="24"
              viewBox="0 -960 960 960"
              width="24"
              fill="#4f4f4f"
            >
              <path
                xmlns="https://www.w3.org/200ff0/svg"
                d="M80-707v-173h173v60H140v113H80Zm0 627v-173h60v113h113v60H80Zm627 0v-60h113v-113h60v173H707Zm113-627v-113H707v-60h173v173h-60ZM708-251h63v63h-63v-63Zm0-126h63v63h-63v-63Zm-63 63h63v63h-63v-63Zm-63 63h63v63h-63v-63Zm-63-63h63v63h-63v-63Zm126-126h63v63h-63v-63Zm-63 63h63v63h-63v-63Zm-63-63h63v63h-63v-63Zm252-332v252H519v-252h252ZM440-440v252H188v-252h252Zm0-332v252H188v-252h252Zm-50 534v-152H238v152h152Zm0-332v-152H238v152h152Zm331 0v-152H569v152h152Z"
              />
            </svg>
            <p class="readButtonText">{{home.readText}}</p>
          </button>

          <div class="howToUseWrapper">
            <div class="subTitleWrapper">
              <svg
                xmlns="https://www.w3.org/2000/svg"
                height="28"
                viewBox="0 -960 960 960"
                width="28"
                fill="#707070"
              >
                <path
                  xmlns="https://www.w3.org/2000/svg"
                  d="M484-247q16 0 27-11t11-27q0-16-11-27t-27-11q-16 0-27 11t-11 27q0 16 11 27t27 11Zm-35-146h59q0-26 6.5-47.5T555-490q31-26 44-51t13-55q0-53-34.5-85T486-713q-49 0-86.5 24.5T345-621l53 20q11-28 33-43.5t52-15.5q34 0 55 18.5t21 47.5q0 22-13 41.5T508-512q-30 26-44.5 51.5T449-393Zm31 313q-82 0-155-31.5t-127.5-86Q143-252 111.5-325T80-480q0-83 31.5-156t86-127Q252-817 325-848.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 82-31.5 155T763-197.5q-54 54.5-127 86T480-80Zm0-60q142 0 241-99.5T820-480q0-142-99-241t-241-99q-141 0-240.5 99T140-480q0 141 99.5 240.5T480-140Zm0-340Z"
                />
              </svg>
              <h2 class="howToUseTitle">{{home.howToUse}}</h2>
            </div>
            <ol class="howToUseOrderList">
              <li class="howToUseList">{{home.step1}}</li>
              <li class="howToUseList">{{home.step2}}</li>
            </ol>
          </div>
          <div class="linkToBuyMeACoffeeWrapper">
            <a
              href="https://buymeacoffee.com/hirokiwa"
              target="_blank"
              class="linkToBuyMeACoffee"
              title="{{home.supportTitle}}"
              >{{home.supportText}}</a
            >
          </div>
        </div>
        <div class="sideContent">
          <div class="historyTitleWrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="28"
              viewBox="0 -960 960 960"
              width="28"
              fill="#707070"
            >
              <path
                d="M477-120q-149 0-253-105.5T120-481h60q0 125 86 213t211 88q127 0 215-89t88-216q0-124-89-209.5T477-780q-68 0-127.5 31T246-667h105v60H142v-208h60v106q52-61 123.5-96T477-840q75 0 141 28t115.5 76.5Q783-687 811.5-622T840-482q0 75-28.5 141t-78 115Q684-177 618-148.5T477-120Zm128-197L451-469v-214h60v189l137 134-43 43Z"
              />
            </svg>
            <h2 class="historyTitle">{{home.history}}</h2>
          </div>
          <div id="historyElement" class="historyWrapper"></div>
        </div>
        <div class="rightSideContent">
          <!--  -->
          <script
            async
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5553296223899055"
            crossorigin="anonymous"
          ></script>
          <ins
            class="adsbygoogle"
            style="display: block"
            data-ad-client="ca-pub-5553296223899055"
            data-ad-slot="7119341722"
            data-ad-format="auto"
            data-full-width-responsive="true"
          ></ins>
          <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
          <!--  -->
          <script
            async
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5553296223899055"
            crossorigin="anonymous"
          ></script>
          <ins
            class="adsbygoogle"
            style="display: block"
            data-ad-client="ca-pub-5553296223899055"
            data-ad-slot="9728235339"
            data-ad-format="auto"
            data-full-width-responsive="true"
          ></ins>
          <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
          <!--  -->
        </div>
      </div>
    </div>
    <footer class="footer">
      <nav class="footer__nav" aria-label="{{common.footerAriaLabel}}">
        <ul class="footer__list">
          <li class="footer-link-list__item">
            <a href="{{common.privacyHref}}" class="link-item">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 -960 960 960"
                aria-hidden="true"
                focusable="false"
                fill="#707070"
              >
                <path
                  d="M440-280h80v-240h-80v240Zm40-320q17 0 28.5-11.5T520-640q0-17-11.5-28.5T480-680q-17 0-28.5 11.5T440-640q0 17 11.5 28.5T480-600Zm0 520q-139-35-229.5-159.5T160-516v-244l320-120 320 120v244q0 152-90.5 276.5T480-80Zm0-84q104-33 172-132t68-220v-189l-240-90-240 90v189q0 121 68 220t172 132Zm0-316Z"
                />
              </svg>
              <span class="link-item__text">{{common.privacyLabel}}</span>
            </a>
          </li>
          <li class="footer-link-list__item">
            <a href="{{common.contactHref}}" class="link-item">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 -960 960 960"
                aria-hidden="true"
                focusable="false"
                fill="#707070"
              >
                <path
                  d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm320-280L160-640v400h640v-400L480-440Zm0-80 320-200H160l320 200ZM160-640v-80 480-400Z"
                />
              </svg>
              <span class="link-item__text">{{common.contactLabel}}</span>
            </a>
          </li>
        </ul>
      </nav>

      <small class="footer-copyright">
        <span class="footer-copyright__service-name">{{common.brandName}}</span>
        <span class="footer-copyright__meta">
          <span class="footer-copyright__symbol" aria-label="{{common.copyrightAriaLabel}}">©</span>
          <span class="footer-copyright__owner">hiroki</span>
          <time class="footer-copyright__year" datetime="2023">2023</time>
        </span>
      </small>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
